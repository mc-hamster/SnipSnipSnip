name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # Tests are disabled in CI because SnipSnipSnipTests has a macOS 26.2
      # deployment target and GitHub-hosted runners run macOS 15. The OS
      # version mismatch prevents the test bundle from loading at all, so
      # neither @available guards nor -only-testing flags can work around it.
      # Build-only verification ensures the project compiles correctly.
      - name: Build verification (tests disabled — macOS 26.2 deployment target incompatible with hosted runners)
        run: |
          set -o pipefail
          xcodebuild build \
            -project SnipSnipSnip.xcodeproj \
            -scheme SnipSnipSnip \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO
