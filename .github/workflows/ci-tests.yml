name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run test suite
        run: |
          set -o pipefail
          xcodebuild test \
            -project SnipSnipSnip.xcodeproj \
            -scheme SnipSnipSnip \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -only-testing 'SnipSnipSnipTests/CaptureModelsTests' \
            -only-testing 'SnipSnipSnipTests/GeometrySupportTests' \
            -only-testing 'SnipSnipSnipTests/EditorControllerTests/testPresentationCornerRadiusClampsToOneHundred' \
            -only-testing 'SnipSnipSnipTests/EditorControllerTests/testPresentationDefaultsToTransparentBackground' \
            -only-testing 'SnipSnipSnipTests/EditorControllerTests/testPresentationPresetChangesAreUndoable' \
            -only-testing 'SnipSnipSnipTests/EditorControllerTests/testPresentationShadowDirectionControlsSignedOffsets' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult"

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          if-no-files-found: warn
