<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <metadata id="snipsnipsnip-scene">
{
  "schema": "com.oontz.snipsnipsnip.presentation-scene",
  "schemaVersion": 1,
  "id": "builtin.social-card-clean",
  "name": "Social Card Clean",
  "version": 3,
  "author": "SnipSnipSnip",
  "description": "Editorial 4:5 social card with heading, subtitle, screenshot, and footer slots.",
  "canvas": { "width": 1200, "height": 1500 },
  "slots": [
    { "id": "primaryScreenshot", "type": "image", "required": true, "label": "Screenshot", "defaultFraming": "auto", "allowUserOverride": true, "minScale": 0.25, "maxScale": 3, "maxAutoEnlargement": 1.5 },
    { "id": "heading", "type": "text", "label": "Heading", "defaultValue": "Launch Notes" },
    { "id": "subtitle", "type": "text", "label": "Subtitle", "defaultValue": "A clear view of the latest workflow." },
    { "id": "footer", "type": "text", "label": "Footer", "defaultValue": "SnipSnipSnip" }
  ]
}
  </metadata>
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fafb"/>
      <stop offset="0.5" stop-color="#edf4f8"/>
      <stop offset="1" stop-color="#e9eef6"/>
    </linearGradient>
    <linearGradient id="card-wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbfdff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="card-shadow" x="-12%" y="-10%" width="124%" height="122%">
      <feDropShadow dx="0" dy="34" stdDeviation="32" flood-color="#1e293b" flood-opacity="0.14"/>
    </filter>
    <filter id="shot-shadow" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.20"/>
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <clipPath id="shot-clip">
      <rect x="158" y="488" width="884" height="626" rx="32"/>
    </clipPath>
  </defs>

  <rect width="1200" height="1500" fill="url(#card-bg)"/>
  <circle cx="1040" cy="120" r="240" fill="#ffffff" opacity="0.54"/>
  <circle cx="70" cy="1360" r="300" fill="#c7d2fe" opacity="0.22"/>

  <g filter="url(#card-shadow)">
    <rect x="98" y="92" width="1004" height="1316" rx="52" fill="url(#card-wash)" stroke="#dde6ef"/>
    <rect x="142" y="142" width="916" height="10" rx="5" fill="url(#accent)"/>
    <text x="158" y="238" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="18" font-weight="760" letter-spacing="2.8" fill="#64748b">SCREENSHOT STORY</text>
    <text id="heading" data-sss-slot="heading" x="158" y="332" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="74" font-weight="780" fill="#0f172a">Launch Notes</text>
    <text id="subtitle" data-sss-slot="subtitle" x="160" y="390" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="31" font-weight="460" fill="#64748b">A clear view of the latest workflow.</text>

    <g filter="url(#shot-shadow)">
      <rect x="158" y="488" width="884" height="626" rx="32" fill="#f8fafc"/>
      <image id="primary-screenshot" data-sss-slot="primaryScreenshot" href="snipsnipsnip:primaryScreenshot" x="158" y="488" width="884" height="626" preserveAspectRatio="xMidYMid slice" clip-path="url(#shot-clip)"/>
      <rect x="158" y="488" width="884" height="626" rx="32" fill="none" stroke="#d6dee9" stroke-width="2"/>
    </g>

    <rect x="158" y="1204" width="884" height="1.5" fill="#e2e8f0"/>
    <text id="footer" data-sss-slot="footer" x="158" y="1280" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="29" font-weight="680" fill="#475569">SnipSnipSnip</text>
    <g transform="translate(902 1240)">
      <rect x="0" y="0" width="140" height="54" rx="27" fill="#f8fafc" stroke="#d9e2ec"/>
      <circle cx="32" cy="27" r="8" fill="#0ea5e9"/>
      <circle cx="58" cy="27" r="8" fill="#6366f1"/>
      <circle cx="84" cy="27" r="8" fill="#f59e0b"/>
      <path d="M112 19L120 27L112 35" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
